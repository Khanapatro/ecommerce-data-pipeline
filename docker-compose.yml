version: "3.8"

services:

# =====================================================
# KAFKA BROKER
# =====================================================
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

    volumes:
      - kafka_data:/var/lib/kafka/data

    healthcheck:
      test: ["CMD-SHELL","kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      retries: 10


# =====================================================
# KAFKA UI
# =====================================================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui

    depends_on:
      kafka:
        condition: service_healthy

    ports:
      - "8080:8080"

    environment:
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092


# =====================================================
# KAFKA CONNECT
# =====================================================
  kafka-connect:
    image: confluentinc/cp-kafka-connect:7.6.0
    container_name: kafka-connect

    depends_on:
      kafka:
        condition: service_healthy

    ports:
      - "8083:8083"

    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka:29092
      CONNECT_REST_PORT: 8083
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect

      CONNECT_GROUP_ID: ecom-connect
      CONNECT_CONFIG_STORAGE_TOPIC: connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: connect-status

      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_CONFLUENT_TOPIC_REPLICATION_FACTOR: 1

      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"

      CONNECT_PLUGIN_PATH: /usr/share/java,/etc/kafka-connect/plugins

      AZURE_STORAGE_ACCOUNT_NAME: ${AZURE_STORAGE_ACCOUNT_NAME}
      AZURE_STORAGE_ACCOUNT_KEY: ${AZURE_STORAGE_ACCOUNT_KEY}

    volumes:
      - ./kafka-connect-plugins:/etc/kafka-connect/plugins


# =====================================================
# TOPIC CREATION
# =====================================================
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0

    depends_on:
      kafka:
        condition: service_healthy

    entrypoint: /bin/sh

    command: >
      -c "
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic ecom.orders --partitions 3 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic ecom.payments --partitions 3 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic ecom.customers --partitions 3 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic ecom.inventory --partitions 3 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic ecom.clickstream --partitions 3 --replication-factor 1
      "


# =====================================================
# PRODUCER
# =====================================================
  producer:
    build: ./producer
    container_name: faker-producer
    profiles: ["producer"]

    depends_on:
      kafka:
        condition: service_healthy

    environment:
      KAFKA_BROKER: kafka:29092

    volumes:
      - ./producer:/app


# =====================================================
# POSTGRES
# =====================================================
  postgres:
    image: postgres:15
    container_name: postgres

    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5


# =====================================================
# AIRFLOW INIT
# =====================================================
  airflow-init:
    image: apache/airflow:2.8.1

    depends_on:
      postgres:
        condition: service_healthy

    entrypoint: /bin/bash

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow

    command: >
      -c "
      airflow db init &&
      airflow users create
      --username admin
      --password admin
      --firstname Admin
      --lastname User
      --role Admin
      --email admin@example.com
      "


# =====================================================
# AIRFLOW WEBSERVER
# =====================================================
  airflow-webserver:
    image: apache/airflow:2.8.1

    depends_on:
      - airflow-init

    ports:
      - "8081:8080"

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow

    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins

    command: webserver


# =====================================================
# AIRFLOW SCHEDULER
# =====================================================
  airflow-scheduler:
    image: apache/airflow:2.8.1

    depends_on:
      - airflow-init

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow

    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins

    command: scheduler


# =====================================================
# DBT
# =====================================================
  dbt:
    build:
      context: ./dbt_project
      dockerfile: Dockerfile
    container_name: dbt

    volumes:
      - ./dbt_project:/usr/app/dbt
      - ./dbt_project/profiles.yml:/root/.dbt/profiles.yml

    environment:
      DBT_PROFILES_DIR: /usr/app/dbt
      DATABRICKS_HOST: ${DATABRICKS_HOST}
      DATABRICKS_HTTP_PATH: ${DATABRICKS_HTTP_PATH}
      DATABRICKS_TOKEN: ${DATABRICKS_TOKEN}

    working_dir: /usr/app/dbt
    entrypoint: ["tail", "-f", "/dev/null"]


volumes:
  kafka_data:
  postgres_data: